<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pending Approval | Health-Flow</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2.39.0/dist/umd/supabase.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 24px;
            padding: 48px;
            text-align: center;
            max-width: 500px;
        }
        .icon { font-size: 64px; margin-bottom: 20px; }
        h1 { color: #1e3c72; margin-bottom: 16px; }
        p { color: #666; margin-bottom: 24px; line-height: 1.6; }
        .email {
            background: #f5f5f5;
            padding: 12px;
            border-radius: 12px;
            font-family: monospace;
            margin: 20px 0;
        }
        .clinic-info {
            background: #e5f3ff;
            padding: 12px;
            border-radius: 12px;
            margin: 20px 0;
            font-size: 14px;
        }
        .logout-btn {
            background: #dc2626;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
        }
        .logout-btn:hover { background: #b91c1c; }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e0e0e0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">⏳</div>
        <h1>Pending Approval</h1>
        <p>Your staff account has been registered and is waiting for administrator approval.</p>
        <div class="email" id="userEmail">Loading...</div>
        <div class="clinic-info" id="clinicInfo">Loading clinic information...</div>
        <p style="font-size: 14px;">You will receive staff access once an administrator approves your account.</p>
        <div class="spinner" id="spinner"></div>
        <button class="logout-btn" id="logoutBtn">Logout</button>
    </div>

    <script>
        const SUPABASE_URL = "https://ixikhufrylaugpdxokwu.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_7T38wLjTEs7UJKMMTxl9tQ_OLM6Wsf3";
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let checkInterval;

        async function checkAndRedirect() {
            const { data: { session } } = await supabase.auth.getSession();
            
            if (!session) {
                window.location.href = '/pages/index.html';
                return;
            }
            
            document.getElementById('userEmail').textContent = session.user.email;
            
            // Get pending staff record
            const { data: pending } = await supabase
                .from('pending_staff')
                .select('*')
                .eq('email', session.user.email)
                .single();
            
            if (pending) {
                // Get clinic name - using correct field name 'Name' (capital N)
                const { data: clinic } = await supabase
                    .from('Facilities')
                    .select('Name')
                    .eq('ClinicID', pending.clinicid)
                    .single();
                
                if (clinic) {
                    document.getElementById('clinicInfo').innerHTML = `🏥 Requested Clinic: ${clinic.Name}`;
                } else {
                    document.getElementById('clinicInfo').innerHTML = `🏥 Clinic ID: ${pending.clinicid}`;
                }
            }
            
            // Check if user is now approved staff
            const { data: staff } = await supabase
                .from('staffs')
                .select('*')
                .eq('email', session.user.email)
                .single();
            
            if (staff) {
                clearInterval(checkInterval);
                window.location.href = '/pages/staff-dashboard.html';
            } else {
                document.getElementById('spinner').style.display = 'none';
            }
        }
        
        async function logout() {
            clearInterval(checkInterval);
            await supabase.auth.signOut();
            window.location.href = '/pages/index.html';
        }
        
        document.getElementById('logoutBtn').addEventListener('click', logout);
        
        checkAndRedirect();
        checkInterval = setInterval(checkAndRedirect, 5000);
    </script>
</body>
</html>
