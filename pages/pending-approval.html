<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pending Approval | Health-Flow</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        main {
            background: white;
            border-radius: 24px;
            padding: 48px;
            text-align: center;
            max-width: 500px;
        }
        .icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        h1 {
            color: #1e3c72;
            margin-bottom: 16px;
        }
        p {
            color: #666;
            margin-bottom: 24px;
            line-height: 1.6;
        }
        .email {
            background: #f5f5f5;
            padding: 12px;
            border-radius: 12px;
            font-family: monospace;
            margin: 20px 0;
        }
        .clinic-info {
            background: #e5f3ff;
            padding: 12px;
            border-radius: 12px;
            margin: 20px 0;
            font-size: 14px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e0e0e0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        small {
            font-size: 14px;
            display: block;
        }
    </style>
</head>
<body>

    <main>
        <p class="icon">⏳</p>
        <h1>Pending Approval</h1>
        <p>Your staff account has been registered and is waiting for administrator approval.</p>
        <section class="email" id="userEmail">Loading...</section>
        <section class="clinic-info" id="clinicInfo">Loading clinic information...</section>
        <small>You will receive staff access once an administrator approves your account.</small>
        <section class="spinner" id="spinner"></section>
    </main>

    <script type="module" src="../backend/pending-approval.js"></script>

</body>
</html>
