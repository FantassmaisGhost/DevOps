<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Login</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2.39.0/dist/umd/supabase.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0b0e14 0%, #1a1f2e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .login-container {
            background: #111520;
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            border: 1px solid #252b3d;
        }
        h1 { color: #dce2f0; text-align: center; margin-bottom: 30px; }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: #171c28;
            border: 1px solid #252b3d;
            border-radius: 8px;
            color: #dce2f0;
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #00e5a0;
            border: none;
            border-radius: 8px;
            color: #0b0e14;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
        }
        .error {
            color: #ff6b6b;
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>Staff Login</h1>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button id="loginBtn">Login</button>
        <div id="error" class="error"></div>
    </div>

    <script>
        const SUPABASE_URL = "https://ixikhufrylaugpdxokwu.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml4aWtodWZyeWxhdWdwZHhva3d1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NTQ0NTIsImV4cCI6MjA5MTIzMDQ1Mn0.F7g_bNWAsxjWtkHihVNYPicghiKOisgHGV9-zaBjXvQ";
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        document.getElementById('loginBtn').onclick = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            const { data: staff, error } = await supabase
                .from('staffs')
                .select('*')
                .eq('email', email)
                .eq('password', password)
                .single();
            
            if (staff) {
                sessionStorage.setItem('staff', JSON.stringify(staff));
                window.location.href = 'staff-dashboard.html';
            } else {
                document.getElementById('error').innerText = 'Invalid email or password';
            }
        };
    </script>
</body>
</html>
