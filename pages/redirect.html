<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2.39.0/dist/umd/supabase.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            border-radius: 24px;
            padding: 48px;
            text-align: center;
            max-width: 400px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e0e0e0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        p { color: #666; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <p>Redirecting you to your dashboard...</p>
    </div>

    <script>
        const SUPABASE_URL = "https://ixikhufrylaugpdxokwu.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_7T38wLjTEs7UJKMMTxl9tQ_OLM6Wsf3";
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const urlParams = new URLSearchParams(window.location.search);
        const selectedRole = urlParams.get('role');

        async function handleRedirect() {
            const { data: { session } } = await supabase.auth.getSession();
            
            if (!session) {
                window.location.href = '/pages/index.html';
                return;
            }

            const email = session.user.email;
            const userId = session.user.id;
            const userName = session.user.user_metadata?.full_name || email.split('@')[0];

            if (selectedRole === 'staff') {
                // Check if already approved staff
                const { data: staff } = await supabase
                    .from('staffs')
                    .select('*')
                    .eq('email', email)
                    .single();

                if (staff) {
                    window.location.href = '/pages/staff-dashboard.html';
                    return;
                }

                // Check if in pending_staff (registered but waiting)
                const { data: pending } = await supabase
                    .from('pending_staff')
                    .select('*')
                    .eq('email', email)
                    .single();

                if (pending) {
                    window.location.href = '/pages/pending-approval.html';
                    return;
                }
                
                // Staff selected role but not registered - send back to login
                window.location.href = '/pages/index.html';
            } else {
                // Patient role
                const { data: patient } = await supabase
                    .from('patients')
                    .select('*')
                    .eq('id', userId)
                    .single();

                if (!patient) {
                    await supabase
                        .from('patients')
                        .insert([{
                            id: userId,
                            role: 'patient',
                            full_name: userName,
                            created_at: new Date(),
                            updated_at: new Date()
                        }]);
                }

                window.location.href = '/pages/dashboard.html';
            }
        }

        handleRedirect();
    </script>
</body>
</html>
