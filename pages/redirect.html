<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2.39.0/dist/umd/supabase.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            border-radius: 24px;
            padding: 48px;
            text-align: center;
            max-width: 400px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e0e0e0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        p { color: #666; margin-top: 20px; }
        .error-message {
            color: #dc2626;
            margin-top: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner" id="spinner"></div>
        <p id="message">Redirecting you to your dashboard...</p>
        <div id="errorMsg" class="error-message"></div>
    </div>

    <script>
        const SUPABASE_URL = "https://ixikhufrylaugpdxokwu.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_7T38wLjTEs7UJKMMTxl9tQ_OLM6Wsf3";
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const urlParams = new URLSearchParams(window.location.search);
        const selectedRole = urlParams.get('role');

        async function handleRedirect() {
            const { data: { session } } = await supabase.auth.getSession();
            
            if (!session) {
                localStorage.removeItem('userRole');
                window.location.href = '/pages/index.html';
                return;
            }

            const email = session.user.email;
            const userId = session.user.id;
            const userName = session.user.user_metadata?.full_name || email.split('@')[0];

            // Check what type of user this actually is
            const { data: admin } = await supabase
                .from('Admin')
                .select('*')
                .eq('Email', email)
                .single();

            const { data: staff } = await supabase
                .from('staffs')
                .select('*')
                .eq('email', email)
                .single();

            const { data: pending } = await supabase
                .from('pending_staff')
                .select('*')
                .eq('email', email)
                .single();

            // Determine actual user type
            let actualRole = 'patient';
            if (admin) actualRole = 'admin';
            else if (staff) actualRole = 'staff';
            else if (pending) actualRole = 'pending';

            // If no role was selected (direct access), use actual role
            if (!selectedRole) {
                // Send to correct dashboard based on actual role
                if (actualRole === 'admin') {
                    localStorage.setItem('userRole', 'admin');
                    window.location.href = '/pages/admin-dashboard.html';
                } else if (actualRole === 'staff') {
                    localStorage.setItem('userRole', 'staff');
                    window.location.href = '/pages/staff-dashboard.html';
                } else if (actualRole === 'pending') {
                    localStorage.setItem('userRole', 'pending');
                    window.location.href = '/pages/pending-approval.html';
                } else {
                    // Create patient record if needed
                    const { data: patient } = await supabase
                        .from('Patients')
                        .select('*')
                        .eq('id', userId)
                        .single();

                    if (!patient) {
                        await supabase
                            .from('Patients')
                            .insert([{
                                id: userId,
                                role: 'patient',
                                full_name: userName,
                                created_at: new Date(),
                                updated_at: new Date()
                            }]);
                    }
                    localStorage.setItem('userRole', 'patient');
                    window.location.href = '/pages/dashboard.html';
                }
                return;
            }

            // VALIDATE: Check if selected role matches actual role
            let isValid = false;
            let targetUrl = '';

            if (selectedRole === 'admin' && actualRole === 'admin') {
                isValid = true;
                targetUrl = '/pages/admin-dashboard.html';
                localStorage.setItem('userRole', 'admin');
            } 
            else if (selectedRole === 'staff' && actualRole === 'staff') {
                isValid = true;
                targetUrl = '/pages/staff-dashboard.html';
                localStorage.setItem('userRole', 'staff');
            }
            else if (selectedRole === 'staff' && actualRole === 'pending') {
                isValid = true;
                targetUrl = '/pages/pending-approval.html';
                localStorage.setItem('userRole', 'pending');
            }
            else if (selectedRole === 'patient' && actualRole === 'patient') {
                isValid = true;
                targetUrl = '/pages/dashboard.html';
                localStorage.setItem('userRole', 'patient');
            }
            else if (selectedRole === 'patient' && (actualRole === 'admin' || actualRole === 'staff' || actualRole === 'pending')) {
                // Staff/Admin can also access patient dashboard if they want
                isValid = true;
                targetUrl = '/pages/dashboard.html';
                localStorage.setItem('userRole', 'patient');
            }

            if (isValid) {
                window.location.href = targetUrl;
            } else {
                // Show error message for 3 seconds, then redirect to index
                document.getElementById('spinner').style.display = 'none';
                document.getElementById('message').style.display = 'none';
                document.getElementById('errorMsg').innerHTML = `❌ Access Denied: You are not authorized as "${selectedRole}".<br>Redirecting to login page...`;
                
                setTimeout(() => {
                    localStorage.removeItem('userRole');
                    window.location.href = '/pages/index.html';
                }, 3000);
            }
        }

        handleRedirect();
    </script>
</body>
</html>
