<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Health-Flow</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2.39.0/dist/umd/supabase.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0b0e14;
            color: #dce2f0;
        }
        .header {
            background: #111520;
            border-bottom: 1px solid #252b3d;
            padding: 16px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo h1 { font-size: 20px; color: #f5a623; }
        .admin-badge {
            background: #f5a623;
            color: #0b0e14;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
        }
        .logout-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
        }
        .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
        .card {
            background: #111520;
            border: 1px solid #252b3d;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
        }
        .card h2 { 
            color: #f5a623; 
            margin-bottom: 20px;
            font-size: 18px;
        }
        .card p {
            color: #5a6280;
            margin-bottom: 20px;
        }
        .btn-primary {
            display: inline-block;
            background: #f5a623;
            color: #0b0e14;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            font-size: 14px;
        }
        .btn-primary:hover {
            opacity: 0.85;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo"><h1>🏥 Health-Flow | Admin Portal</h1></div>
        <div class="user-info">
            <span id="userEmail">Loading...</span>
            <span class="admin-badge">ADMIN</span>
            <button class="logout-btn" id="logoutBtn">Logout</button>
        </div>
    </div>
    <div class="container">
        <div class="card">
            <h2>🗺️ Clinic Map</h2>
            <p>View all clinic locations on an interactive map.</p>
            <a href="map.html" class="btn-primary">Open Map →</a>
        </div>
        <div class="card">
            <h2>⚙️ Settings</h2>
            <p>Update system settings and preferences.</p>
            <a href="settings.html" class="btn-primary">Manage Settings →</a>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://ixikhufrylaugpdxokwu.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_7T38wLjTEs7UJKMMTxl9tQ_OLM6Wsf3";
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function loadAdminDashboard() {
            const { data: { session } } = await supabase.auth.getSession();
            
            if (!session) {
                window.location.href = '/pages/index.html';
                return;
            }

            const { data: admin } = await supabase
                .from('admins')
                .select('*')
                .eq('email', session.user.email)
                .single();

            if (!admin) {
                window.location.href = '/pages/index.html';
                return;
            }

            document.getElementById('userEmail').textContent = session.user.email;
        }

        async function logout() {
            await supabase.auth.signOut();
            window.location.href = '/pages/index.html';
        }

        document.getElementById('logoutBtn').addEventListener('click', logout);
        loadAdminDashboard();
    </script>
</body>
</html>
