<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Health Flow Admin</title>

<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        background-color: #f4f6f8;
    }

    header {
        background-color: #0a3d62;
        color: white;
        padding: 20px;
        text-align: center;
    }

    nav {
        background-color: #1e5f8a;
        padding: 10px;
        text-align: center;
    }

    nav a {
        color: white;
        margin: 0 15px;
        text-decoration: none;
        font-weight: bold;
    }

    main {
        padding: 40px;
        text-align: center;
    }

    h2 {
        margin-bottom: 30px;
    }

    section {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 25px;
        max-width: 900px;
        margin: auto;
    }

    article {
        background: white;
        padding: 30px 20px;
        border-radius: 12px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        transition: transform 0.2s ease;
    }

    article:hover {
        transform: translateY(-5px);
    }

    article h3 {
        margin-bottom: 10px;
        color: #0a3d62;
    }

    article p {
        color: #555;
    }

    article a {
        display: inline-block;
        margin-top: 15px;
        padding: 10px 15px;
        background-color: #0984e3;
        color: white;
        border-radius: 6px;
        text-decoration: none;
        font-weight: bold;
    }

    article a:hover {
        background-color: #076bb5;
    }

    footer {
        text-align: center;
        padding: 15px;
        background: #ddd;
        margin-top: 40px;
    }
</style>
</head>

<body>

<header>
    <h1>Health Flow Admin Dashboard</h1>
</header>

<main>
    <h2>Welcome, Admin</h2>

    <section aria-label="Admin dashboard options">

        <article>
            <h3>Clinic Map</h3>
            <p>View all clinic locations on an interactive map.</p>
            <a href="index.html">Open Map</a>
        </article>

        <article>
            <h3>Settings</h3>
            <p>Update settings</p>
            <a href="settings.html">Manage Settings</a>
        </article>


    </section>
</main>
</body>
</html>
