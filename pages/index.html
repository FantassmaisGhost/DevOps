<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health-Flow | Login</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2.39.0/dist/umd/supabase.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo svg {
            width: 80px;
            height: 80px;
            margin-bottom: 16px;
        }

        .logo h1 {
            font-size: 28px;
            color: #1e3c72;
            margin-bottom: 8px;
        }

        .logo p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin-bottom: 12px;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102,126,234,0.4);
        }

        .btn-google {
            background: white;
            color: #333;
            border: 2px solid #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-google:hover:not(:disabled) {
            background: #f5f5f5;
        }

        .toggle-btn {
            background: none;
            color: #667eea;
            margin-top: 16px;
            font-size: 14px;
        }

        .toggle-btn:hover {
            background: none;
            text-decoration: underline;
        }

        .divider {
            text-align: center;
            margin: 24px 0;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #e0e0e0;
        }

        .divider span {
            background: white;
            padding: 0 16px;
            position: relative;
            color: #999;
            font-size: 14px;
        }

        .message {
            margin-top: 16px;
            padding: 14px;
            border-radius: 12px;
            font-size: 14px;
            text-align: center;
            display: none;
            animation: slideDown 0.3s ease;
            font-weight: 500;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.error {
            background: #fee;
            color: #c33;
            border: 1px solid #fcc;
            display: block;
        }

        .message.success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #a7f3d0;
            display: block;
        }

        .message.info {
            background: #e0f2fe;
            color: #075985;
            border: 1px solid #bae6fd;
            display: block;
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .password-hint {
            font-size: 11px;
            color: #999;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <svg viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="45" fill="#e6f0ff" stroke="#3282b8" stroke-width="3"/>
                <rect x="45" y="25" width="10" height="50" fill="#0f4c75" rx="2"/>
                <rect x="25" y="45" width="50" height="10" fill="#0f4c75" rx="2"/>
                <path d="M20 60 L30 60 L35 50 L42 70 L50 40 L58 65 L65 55 L80 55" stroke="#ff4d6d" stroke-width="3" fill="none"/>
            </svg>
            <h1>Health-Flow</h1>
            <p>Clinic Appointment & Queue System</p>
        </div>

        <h2 id="formTitle" style="text-align: center; margin-bottom: 24px;">Welcome Back</h2>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="doctor@healthflow.com">
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••">
            <div id="passwordHint" class="password-hint" style="display: none;">
                🔒 Password must have: 1 uppercase, 1 lowercase, 1 number, 1 special character (!@#$%^&*)
            </div>
        </div>

        <button id="actionBtn" class="btn-primary">Sign In</button>

        <div class="divider">
            <span>OR</span>
        </div>

        <button id="googleBtn" class="btn-google">
            <svg width="20" height="20" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Continue with Google
        </button>

        <button id="toggleBtn" class="toggle-btn">Create new account</button>

        <div id="message" class="message"></div>
    </div>

    <script>
        // Supabase configuration
                                    //ixikhufrylaugpdxokwu
        const SUPABASE_URL = "https://ixikhufrylaugpdxokwu.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml4aWtodWZyeWxhdWdwZHhva3d1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NTQ0NTIsImV4cCI6MjA5MTIzMDQ1Mn0.F7g_bNWAsxjWtkHihVNYPicghiKOisgHGV9-zaBjXvQ";
         //
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let isLogin = true;

        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const actionBtn = document.getElementById('actionBtn');
        const googleBtn = document.getElementById('googleBtn');
        const toggleBtn = document.getElementById('toggleBtn');
        const formTitle = document.getElementById('formTitle');
        const messageDiv = document.getElementById('message');
        const passwordHint = document.getElementById('passwordHint');

        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            
            // Auto-hide after 4 seconds for success, 5 seconds for others
            const duration = type === 'success' ? 4000 : 5000;
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, duration);
        }

        function setLoading(loading) {
            if (loading) {
                actionBtn.disabled = true;
                actionBtn.innerHTML = '<span class="spinner"></span>Processing...';
                googleBtn.disabled = true;
            } else {
                actionBtn.disabled = false;
                actionBtn.innerHTML = isLogin ? 'Sign In' : 'Create Account';
                googleBtn.disabled = false;
            }
        }

        async function handleEmailAuth() {
            const email = emailInput.value.trim();
            const password = passwordInput.value;

            if (!email || !password) {
                showMessage('❌ Please fill in all fields', 'error');
                return;
            }

            if (password.length < 6) {
                showMessage('❌ Password must be at least 6 characters', 'error');
                return;
            }

            setLoading(true);
            passwordHint.style.display = 'none';

            try {
                if (isLogin) {
                    // LOGIN
                    const { data, error } = await supabase.auth.signInWithPassword({
                        email: email,
                        password: password
                    });

                    if (error) {
                        if (error.message === 'Invalid login credentials') {
                            showMessage('❌ Invalid email or password. Please try again.', 'error');
                        } else if (error.message === 'Email not confirmed') {
                            showMessage('📧 Please check your email to confirm your account.', 'error');
                        } else {
                            showMessage(`❌ ${error.message}`, 'error');
                        }
                        setLoading(false);
                        return;
                    }

                    // SUCCESSFUL LOGIN
                    const firstName = email.split('@')[0];
                    showMessage(`🎉 Welcome back, ${firstName}! Redirecting to dashboard...`, 'success');
                    
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1500);
                    
                } else {
                    // SIGN UP
                    const { data, error } = await supabase.auth.signUp({
                        email: email,
                        password: password,
                        options: {
                            data: {
                                created_at: new Date().toISOString()
                            }
                        }
                    });

                    if (error) {
                        if (error.message === 'User already registered') {
                            showMessage('📧 Email already registered. Please login instead.', 'error');
                            setTimeout(() => {
                                toggleMode();
                                setLoading(false);
                            }, 2000);
                        } else if (error.message.includes('Password should contain')) {
                            showMessage('🔒 Password must have: 1 uppercase, 1 lowercase, 1 number, and 1 special character (!@#$%^&*)', 'error');
                            passwordHint.style.display = 'block';
                        } else {
                            showMessage(`❌ ${error.message}`, 'error');
                        }
                        setLoading(false);
                        return;
                    }

                    // SUCCESSFUL SIGNUP
                    showMessage(`✅ SUCCESS! Account created for ${email}. Please login now.`, 'success');
                    
                    // Clear password and switch to login mode
                    passwordInput.value = '';
                    
                    setTimeout(() => {
                        toggleMode();
                        setLoading(false);
                        // Focus on email input
                        emailInput.focus();
                    }, 2000);
                }
            } catch (err) {
                showMessage('❌ An unexpected error occurred. Please try again.', 'error');
                setLoading(false);
            }
        }

        async function handleGoogleLogin() {
            setLoading(true);
            showMessage('🔐 Connecting to Google...', 'info');
            
            try {
                const { error } = await supabase.auth.signInWithOAuth({
                    provider: 'google',
                    options: {
                        redirectTo: `${window.location.origin}redirect.html`,
                        queryParams: {
                            prompt: 'select_account',
                            access_type: 'offline'
                        }
                    }
                });
                
                if (error) {
                    showMessage(`❌ ${error.message}`, 'error');
                    setLoading(false);
                }
            } catch (err) {
                showMessage('❌ Unable to connect to Google. Please try again.', 'error');
                setLoading(false);
            }
        }

        function toggleMode() {
            isLogin = !isLogin;
            if (isLogin) {
                formTitle.textContent = 'Welcome Back';
                actionBtn.innerHTML = 'Sign In';
                toggleBtn.textContent = 'Create new account';
                showMessage('Switch to login mode', 'info');
            } else {
                formTitle.textContent = 'Create Account';
                actionBtn.innerHTML = 'Create Account';
                toggleBtn.textContent = 'Back to Login';
                showMessage('Switch to sign up mode', 'info');
            }
            messageDiv.style.display = 'none';
            passwordHint.style.display = 'none';
            passwordInput.value = '';
        }

        async function checkSession() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                window.location.href = 'dashboard.html';
            }
        }

        // Show password hint when user starts typing in signup mode
        passwordInput.addEventListener('focus', () => {
            if (!isLogin) {
                passwordHint.style.display = 'block';
            }
        });

        passwordInput.addEventListener('blur', () => {
            setTimeout(() => {
                if (!isLogin && !passwordInput.value) {
                    passwordHint.style.display = 'none';
                }
            }, 2000);
        });

        actionBtn.addEventListener('click', handleEmailAuth);
        googleBtn.addEventListener('click', handleGoogleLogin);
        toggleBtn.addEventListener('click', toggleMode);
        
        emailInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleEmailAuth();
        });
        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleEmailAuth();
        });

        checkSession();
    </script>
</body>
</html>
