<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Dashboard | Health-Flow</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0b0e14;
            color: #dce2f0;
        }
        header {
            background: #111520;
            border-bottom: 1px solid #252b3d;
            padding: 16px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        header h1 { font-size: 20px; color: #00e5a0; }
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .staff-badge {
            background: #00e5a0;
            color: #0b0e14;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
        }
        .logout-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
        }
        main { 
            max-width: 1000px; 
            margin: 0 auto; 
            padding: 30px 20px; 
        }
        .welcome-card {
            background: linear-gradient(135deg, #1a2a3d 0%, #111520 100%);
            border: 1px solid #252b3d;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 25px;
        }
        .welcome-card h2 { 
            font-size: 24px; 
            margin-bottom: 8px; 
        }
        .welcome-card p { 
            color: #5a6280; 
            font-size: 14px; 
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #111520;
            border: 1px solid #252b3d;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        .stat-card h3 { 
            font-size: 32px; 
            color: #00e5a0; 
            margin-bottom: 8px; 
        }
        .stat-card p { 
            color: #5a6280; 
            font-size: 12px; 
        }
        .info-card {
            background: #111520;
            border: 1px solid #252b3d;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
        }
        .info-card h3 {
            font-size: 14px;
            color: #5a6280;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
        }
        .info-row {
            display: flex;
            padding: 12px 0;
            border-bottom: 1px solid #252b3d;
        }
        .info-row:last-child { border-bottom: none; }
        .info-label { 
            width: 120px; 
            color: #5a6280; 
            font-size: 13px; 
            font-weight: bold;
        }
        .info-value { 
            flex: 1; 
            font-size: 13px; 
        }
        .action-buttons { 
            display: flex; 
            gap: 15px; 
            margin-top: 20px; 
        }
        .btn-primary {
            background: #00e5a0;
            color: #0b0e14;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-secondary {
            background: transparent;
            border: 1px solid #252b3d;
            color: #dce2f0;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
        }
        .loading { 
            text-align: center; 
            padding: 60px; 
            color: #5a6280; 
        }
    </style>
</head>
<body>

    <header>
        <h1>🏥 Health-Flow | Staff Portal</h1>
        <section class="user-info">
            <strong id="userEmail">Loading...</strong>
            <strong class="staff-badge">STAFF</strong>
            <button class="logout-btn" id="logoutBtn">Logout</button>
        </section>
    </header>

    <main id="dashboardContent">
        <p class="loading">Loading staff dashboard...</p>
    </main>

    <script type="module" src="../backend/staff-dashboard.js"></script>

</body>
</html>
