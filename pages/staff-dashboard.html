<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Dashboard</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0b0e14;
            color: #dce2f0;
            padding: 40px;
        }
        .card {
            background: #111520;
            border: 1px solid #252b3d;
            border-radius: 16px;
            padding: 24px;
            max-width: 500px;
            margin: 0 auto;
        }
        button {
            background: #ff6b6b;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            margin-top: 20px;
        }
        .info-row {
            padding: 10px 0;
            border-bottom: 1px solid #252b3d;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Staff Dashboard</h1>
        <div id="content"></div>
        <button id="logoutBtn">Logout</button>
    </div>

    <script>
        const staff = JSON.parse(sessionStorage.getItem('staff'));
        
        if (!staff) {
            window.location.href = 'staff-login.html';
        }
        
        document.getElementById('content').innerHTML = `
            <div class="info-row"><strong>Name:</strong> ${staff.full_name}</div>
            <div class="info-row"><strong>Email:</strong> ${staff.email}</div>
            <div class="info-row"><strong>Occupation:</strong> ${staff.occupation}</div>
            <div class="info-row"><strong>Clinic ID:</strong> ${staff.clinicid}</div>
            <div class="info-row"><strong>Phone:</strong> ${staff.phone_number || 'N/A'}</div>
        `;
        
        document.getElementById('logoutBtn').onclick = () => {
            sessionStorage.clear();
            window.location.href = 'staff-login.html';
        };
    </script>
</body>
</html>
