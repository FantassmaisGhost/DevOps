<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CareQueue — Admin</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body>

<header class="topbar">
  <div class="topbar-left">
    <div class="logo">
      <div class="logo-mark">C</div>
      <span class="logo-name">CareQueue</span>
      <span class="logo-sub">Admin</span>
    </div>
  </div>
  <div class="topbar-center">
    <span id="clock" class="topbar-clock">00:00:00</span>
  </div>
  <div class="topbar-right">
    <button class="btn btn-blue" id="btn-display">Display Board ↗</button>
    <button class="btn btn-neutral" id="btn-reset">Reset Day</button>
  </div>
</header>

<div class="admin-layout">

  <!-- LEFT: Queue -->
  <aside class="sidebar-left">
    <div class="panel-label">
      <span class="panel-title">Add Patient</span>
    </div>
    <div class="add-form">
      <div class="field">
        <label>Patient name</label>
        <input type="text" id="inp-name" placeholder="Full name…" autocomplete="off" />
      </div>
      <div class="form-row">
        <div class="field">
          <label>Department</label>
          <select id="inp-dept">
            <option value="GP">General Practice</option>
            <option value="Specialist">Specialist</option>
            <option value="Emergency">Emergency</option>
            <option value="Lab">Laboratory</option>
          </select>
        </div>
        <div class="field">
          <label>Priority</label>
          <select id="inp-priority">
            <option value="normal">Normal</option>
            <option value="high">High</option>
            <option value="urgent">Urgent</option>
          </select>
        </div>
      </div>
      <button class="btn btn-primary btn-full" id="btn-add-patient">+ Add to queue</button>
    </div>

    <div class="panel-label" style="padding-top:16px;">
      <span class="panel-title">Waiting Queue</span>
      <span class="panel-count" id="queue-count">0</span>
    </div>
    <div class="queue-list" id="queue-list">
      <div class="empty-msg">Queue is empty</div>
    </div>
  </aside>

  <!-- CENTER: Doctors -->
  <main class="center-main">
    <div class="center-toolbar">
      <div>
        <div class="center-toolbar-title">Consultation Rooms</div>
        <div class="center-toolbar-sub">Manage doctor assignments and patient flow</div>
      </div>
      <button class="btn btn-neutral" onclick="document.getElementById('add-doctor-panel').classList.toggle('open')">
        + Add Doctor
      </button>
    </div>

    <div class="add-doctor-panel" id="add-doctor-panel">
      <div class="add-doctor-title">Register new doctor</div>
      <div class="add-doctor-form">
        <div class="field">
          <label>Doctor name</label>
          <input type="text" id="doc-name" placeholder="Dr. …" />
        </div>
        <div class="field">
          <label>Department</label>
          <select id="doc-dept">
            <option value="GP">General Practice</option>
            <option value="Specialist">Specialist</option>
            <option value="Emergency">Emergency</option>
            <option value="Lab">Laboratory</option>
          </select>
        </div>
        <div class="field">
          <label>Room</label>
          <input type="text" id="doc-room" placeholder="Room 5…" />
        </div>
        <button class="btn btn-primary" id="btn-add-doctor">Add</button>
      </div>
    </div>

    <div class="doctor-grid" id="doctor-grid"></div>
  </main>

  <!-- RIGHT: Stats + Completed -->
  <aside class="sidebar-right">
    <div class="stats-section">
      <div class="panel-label">
        <span class="panel-title">Today</span>
      </div>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-val" id="s-total">0</div>
          <div class="stat-lbl">Total</div>
        </div>
        <div class="stat-card">
          <div class="stat-val" id="s-done">0</div>
          <div class="stat-lbl">Completed</div>
        </div>
        <div class="stat-card">
          <div class="stat-val" id="s-waiting">0</div>
          <div class="stat-lbl">Waiting</div>
        </div>
        <div class="stat-card">
          <div class="stat-val" id="s-avg">—</div>
          <div class="stat-lbl">Avg Visit</div>
        </div>
        <div class="stat-card stat-full">
          <div class="stat-val" id="s-doctors">0</div>
          <div class="stat-lbl">Active Doctors</div>
        </div>
      </div>
    </div>

    <div class="completed-section">
      <div class="panel-label">
        <span class="panel-title">Completed</span>
      </div>
      <div class="completed-list" id="completed-list">
        <div class="empty-msg">No completed visits yet</div>
      </div>
    </div>
  </aside>

</div>

<script type="module" src="queue.js"></script>
<script type="module" src="admin.js"></script>
</body>
</html>
