<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Notifications — SA HealthMap</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@supabase/supabase-js@2.39.0/dist/umd/supabase.js"></script>
  <style>
    :root {
      --bg:        #0b0e14;
      --surface:   #111520;
      --surface2:  #171c28;
      --border:    #252b3d;
      --accent:    #00e5a0;
      --accent2:   #ff6b6b;
      --text:      #dce2f0;
      --text-muted:#5a6280;
      --font-mono: 'Space Mono', monospace;
      --font-disp: 'Syne', sans-serif;
      --radius:    6px;
      --shadow:    0 4px 24px rgba(0,0,0,0.5);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      min-height: 100vh;
    }

    /* Top Bar */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 52px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-disp);
      font-weight: 800;
      font-size: 15px;
    }

    .brand-icon {
      color: var(--accent);
      font-size: 18px;
    }

    .btn-outline {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 6px 12px;
      text-decoration: none;
      transition: all 0.15s;
      background: transparent;
      cursor: pointer;
    }

    .btn-outline:hover {
      color: var(--text);
      border-color: var(--text-muted);
    }

    .btn-primary {
      background: var(--accent);
      color: var(--bg);
      border: none;
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 700;
      padding: 6px 12px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn-primary:hover {
      opacity: 0.85;
    }

    /* Container */
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 32px 20px;
    }

    /* Header Section */
    .notifications-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }

    h1 {
      font-family: var(--font-disp);
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .badge {
      background: var(--accent);
      color: var(--bg);
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 700;
      margin-left: 8px;
    }

    /* Filters */
    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .filter-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 6px 14px;
      border-radius: var(--radius);
      font-family: var(--font-mono);
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn.active {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
    }

    .filter-btn:hover:not(.active) {
      border-color: var(--text-muted);
      color: var(--text);
    }

    /* Notifications List */
    .notifications-list {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .notification {
      padding: 18px 20px;
      border-bottom: 1px solid var(--border);
      transition: background 0.2s;
      cursor: pointer;
    }

    .notification:last-child {
      border-bottom: none;
    }

    .notification:hover {
      background: var(--surface2);
    }

    .notification.unread {
      background: rgba(0, 229, 160, 0.05);
      border-left: 3px solid var(--accent);
    }

    .notification-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      flex-wrap: wrap;
      gap: 8px;
    }

    .notification-type {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.05em;
      padding: 2px 8px;
      border-radius: 4px;
      background: var(--surface2);
      color: var(--text-muted);
      text-transform: uppercase;
    }

    .notification-type.appointment {
      color: var(--accent);
      border-left: 2px solid var(--accent);
    }

    .notification-time {
      font-size: 10px;
      color: var(--text-muted);
    }

    .notification-message {
      font-size: 13px;
      line-height: 1.5;
      margin-bottom: 8px;
    }

    .notification-actions {
      display: flex;
      gap: 12px;
      margin-top: 8px;
    }

    .action-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: 10px;
      cursor: pointer;
      transition: color 0.15s;
      padding: 0;
    }

    .action-btn:hover {
      color: var(--accent);
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    /* Loading State */
    .loading-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .spinner {
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Responsive */
    @media (max-width: 600px) {
      .container {
        padding: 20px 16px;
      }
      
      h1 {
        font-size: 24px;
      }
      
      .notification {
        padding: 14px 16px;
      }
    }
  </style>
</head>
<body>

  <!-- TOPBAR -->
  <header class="topbar">
    <span class="brand">
      <span class="brand-icon" aria-hidden="true">✚</span>
      <strong class="brand-name">SA HealthMap</strong>
    </span>
    <div style="display: flex; gap: 12px;">
      <a href="booking.html" class="btn-outline" id="bookBtn" style="display: none;">Book Appointment</a>
      <button id="logoutBtn" class="btn-outline">Logout</button>
    </div>
  </header>

  <main class="container">
    <div class="notifications-header">
      <div>
        <h1>
          Notifications
          <span id="unreadBadge" class="badge" style="display: none;">0</span>
        </h1>
      </div>
      <button id="markAllReadBtn" class="btn-primary" style="display: none;">Mark all as read</button>
    </div>

    <div class="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="unread">Unread</button>
      <button class="filter-btn" data-filter="appointment">Appointments</button>
    </div>

    <div id="notificationsContainer">
      <div class="loading-state">
        <div class="spinner"></div>
        <p style="margin-top: 12px;">Loading notifications...</p>
      </div>
    </div>
  </main>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js'
    import { 
      getUserNotifications, 
      markNotificationAsRead, 
      markAllNotificationsAsRead,
      deleteNotification,
      getUnreadCount 
    } from './backend/notificationService.js';

    const SUPABASE_URL = "https://ixikhufrylaugpdxokwu.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml4aWtodWZyeWxhdWdwZHhva3d1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NTQ0NTIsImV4cCI6MjA5MTIzMDQ1Mn0.F7g_bNWAsxjWtkHihVNYPicghiKOisgHGV9-zaBjXvQ";
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentUser = null;
    let allNotifications = [];
    let currentFilter = 'all';

    // Check authentication
    async function checkAuth() {
      const { data: { session } } = await sb.auth.getSession();
      
      if (!session) {
        window.location.href = 'index.html';
        return null;
      }
      
      currentUser = session.user;
      document.getElementById('bookBtn').style.display = 'inline-block';
      return currentUser;
    }

    // Load notifications
    async function loadNotifications() {
      if (!currentUser) return;
      
      const container = document.getElementById('notificationsContainer');
      container.innerHTML = '<div class="loading-state"><div class="spinner"></div><p>Loading notifications...</p></div>';
      
      const notifications = await getUserNotifications(currentUser.id);
      allNotifications = notifications;
      
      // Update unread count
      await updateUnreadCount();
      
      renderNotifications();
    }

    // Update unread count badge
    async function updateUnreadCount() {
      if (!currentUser) return;
      
      const count = await getUnreadCount(currentUser.id);
      const badge = document.getElementById('unreadBadge');
      const markAllBtn = document.getElementById('markAllReadBtn');
      
      if (count > 0) {
        badge.textContent = count;
        badge.style.display = 'inline-block';
        markAllBtn.style.display = 'inline-block';
      } else {
        badge.style.display = 'none';
        markAllBtn.style.display = 'none';
      }
    }

    // Format time
    function formatTime(dateString) {
      const date = new Date(dateString);
      const now = new Date();
      const diffMs = now - date;
      const diffMins = Math.floor(diffMs / 60000);
      const diffHours = Math.floor(diffMins / 60);
      const diffDays = Math.floor(diffHours / 24);
      
      if (diffMins < 1) return 'Just now';
      if (diffMins < 60) return `${diffMins} minute${diffMins === 1 ? '' : 's'} ago`;
      if (diffHours < 24) return `${diffHours} hour${diffHours === 1 ? '' : 's'} ago`;
      if (diffDays < 7) return `${diffDays} day${diffDays === 1 ? '' : 's'} ago`;
      
      return date.toLocaleDateString('en-ZA', {
        day: 'numeric',
        month: 'short',
        year: 'numeric'
      });
    }

    // Escape HTML
    function escapeHtml(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // Render notifications based on filter
    function renderNotifications() {
      const container = document.getElementById('notificationsContainer');
      
      let filtered = allNotifications;
      
      if (currentFilter === 'unread') {
        filtered = allNotifications.filter(n => !n.is_read);
      } else if (currentFilter === 'appointment') {
        filtered = allNotifications.filter(n => n.type === 'appointment');
      }
      
      if (filtered.length === 0) {
        let message = 'No notifications';
        if (currentFilter === 'unread') message = 'No unread notifications';
        if (currentFilter === 'appointment') message = 'No appointment notifications';
        
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">🔔</div>
            <p>${message}</p>
          </div>
        `;
        return;
      }
      
      container.innerHTML = filtered.map(notification => `
        <div class="notification ${!notification.is_read ? 'unread' : ''}" data-id="${notification.id}">
          <div class="notification-header">
            <span class="notification-type ${notification.type}">${notification.type || 'general'}</span>
            <span class="notification-time">${formatTime(notification.created_at)}</span>
          </div>
          <div class="notification-message">${escapeHtml(notification.message)}</div>
          <div class="notification-actions">
            ${!notification.is_read ? `<button class="action-btn mark-read" data-id="${notification.id}">✓ Mark as read</button>` : ''}
            <button class="action-btn delete" data-id="${notification.id}">🗑 Delete</button>
          </div>
        </div>
      `).join('');
      
      // Add event listeners
      document.querySelectorAll('.mark-read').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          e.stopPropagation();
          const id = btn.dataset.id;
          await markNotificationAsRead(id);
          await loadNotifications();
        });
      });
      
      document.querySelectorAll('.delete').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          e.stopPropagation();
          if (confirm('Delete this notification?')) {
            const id = btn.dataset.id;
            await deleteNotification(id);
            await loadNotifications();
          }
        });
      });
      
      // Click on notification to mark as read
      document.querySelectorAll('.notification').forEach(notif => {
        notif.addEventListener('click', async (e) => {
          if (e.target.classList.contains('action-btn')) return;
          
          const id = notif.dataset.id;
          const notification = allNotifications.find(n => n.id === id);
          
          if (notification && !notification.is_read) {
            await markNotificationAsRead(id);
            await loadNotifications();
          }
        });
      });
    }

    // Logout function
    async function logout() {
      await sb.auth.signOut();
      window.location.href = 'index.html';
    }

    // Setup event listeners
    function setupEventListeners() {
      document.getElementById('logoutBtn').addEventListener('click', logout);
      document.getElementById('bookBtn').addEventListener('click', () => {
        window.location.href = 'booking.html';
      });
      document.getElementById('markAllReadBtn').addEventListener('click', async () => {
        if (currentUser && confirm('Mark all notifications as read?')) {
          await markAllNotificationsAsRead(currentUser.id);
          await loadNotifications();
        }
      });
      
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          currentFilter = btn.dataset.filter;
          renderNotifications();
        });
      });
    }

    // Initialize
    async function init() {
      await checkAuth();
      if (currentUser) {
        setupEventListeners();
        await loadNotifications();
      }
    }
    
    init();
  </script>
</body>
</html>
