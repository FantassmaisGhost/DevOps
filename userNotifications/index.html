<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health-Flow | Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        main {
            background: white;
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        header {
            text-align: center;
            margin-bottom: 32px;
        }

        header svg {
            width: 80px;
            height: 80px;
            margin-bottom: 16px;
        }

        header h1 {
            font-size: 28px;
            color: #1e3c72;
            margin-bottom: 8px;
        }

        header p {
            color: #666;
            font-size: 14px;
        }

        section {
            margin-bottom: 20px;
        }

        section label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        section input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: border-color 0.2s;
        }

        section input:focus {
            outline: none;
            border-color: #667eea;
        }

        fieldset {
            border: none;
            margin-bottom: 24px;
        }

        legend {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        .role-options {
            display: flex;
            gap: 20px;
            list-style: none;
        }

        .role-options li label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            margin-bottom: 0;
        }

        .role-options input {
            width: auto;
            cursor: pointer;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin-bottom: 12px;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102,126,234,0.4);
        }

        .btn-google {
            background: white;
            color: #333;
            border: 2px solid #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-google:hover:not(:disabled) {
            background: #f5f5f5;
        }

        .btn-secondary {
            background: transparent;
            color: #667eea;
            border: 2px solid #667eea;
            margin-top: 12px;
        }

        .toggle-btn {
            background: none;
            color: #667eea;
            margin-top: 16px;
            font-size: 14px;
        }

        .toggle-btn:hover {
            background: none;
            text-decoration: underline;
        }

        hr {
            margin: 24px 0;
            border: none;
            border-top: 1px solid #e0e0e0;
            position: relative;
            text-align: center;
        }

        hr + p {
            background: white;
            padding: 0 16px;
            position: relative;
            top: -12px;
            color: #999;
            font-size: 14px;
            text-align: center;
        }

        .message {
            margin-top: 16px;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            text-align: center;
            display: none;
        }

        .message.error {
            background: #fee;
            color: #c33;
            border: 1px solid #fcc;
            display: block;
        }

        .message.success {
            background: #efe;
            color: #3c3;
            border: 1px solid #cfc;
            display: block;
        }

        .message.info {
            background: #e5f3ff;
            color: #069;
            border: 1px solid #bdf;
            display: block;
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        dialog {
            border: none;
            border-radius: 24px;
            padding: 32px;
            max-width: 500px;
            width: 90%;
            margin: auto;
            background: white;
        }

        dialog::backdrop {
            background: rgba(0,0,0,0.5);
        }

        dialog h3 {
            margin-bottom: 20px;
            color: #1e3c72;
        }

        dialog p {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
        }

        select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            background: white;
        }

        dialog footer {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        small {
            font-size: 11px;
            color: #999;
            margin-top: 5px;
            display: block;
        }
    </style>
</head>
<body>

    <main>
        <header>
            <svg viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="45" fill="#e6f0ff" stroke="#3282b8" stroke-width="3"/>
                <rect x="45" y="25" width="10" height="50" fill="#0f4c75" rx="2"/>
                <rect x="25" y="45" width="50" height="10" fill="#0f4c75" rx="2"/>
                <path d="M20 60 L30 60 L35 50 L42 70 L50 40 L58 65 L65 55 L80 55" stroke="#ff4d6d" stroke-width="3" fill="none"/>
            </svg>
            <h1>Health-Flow</h1>
            <p>Clinic Appointment & Queue System</p>
        </header>

        <h2 id="formTitle">Login</h2>

        <fieldset>
            <legend>I am a:</legend>
            <ul class="role-options">
                <li>
                    <label>
                        <input type="radio" name="role" value="patient" checked> Patient
                    </label>
                </li>
                <li>
                    <label>
                        <input type="radio" name="role" value="staff"> Staff Member
                    </label>
                </li>
                <li>
                    <label>
                        <input type="radio" name="role" value="admin"> Admin
                    </label>
                </li>
            </ul>
        </fieldset>

        <section>
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="your@email.com">
        </section>

        <section>
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </section>

        <button id="actionBtn" class="btn-primary">Login</button>

        <hr>
        <p>OR</p>
        <hr>

        <button id="googleBtn" class="btn-google">
            <svg width="20" height="20" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Continue with Google
        </button>

        <button id="registerStaffBtn" class="btn-secondary">📝 Register as Staff</button>
        <button id="toggleBtn" class="toggle-btn">Create new account</button>

        <article id="message" class="message"></article>
    </main>

    <dialog id="staffModal">
        <article>
            <h3>Staff Registration</h3>
            <p>Register as staff. You will need to login with Google after registration.</p>
            
            <section>
                <label for="regEmail">Email Address</label>
                <input type="email" id="regEmail" placeholder="your@email.com">
            </section>
            
            <section>
                <label for="regName">Full Name</label>
                <input type="text" id="regName" placeholder="Full Name">
            </section>
            
            <section>
                <label for="regOccupation">Occupation</label>
                <select id="regOccupation">
                    <option value="Doctor">Doctor</option>
                    <option value="Nurse">Nurse</option>
                    <option value="Receptionist">Receptionist</option>
                    <option value="Pharmacist">Pharmacist</option>
                    <option value="Administrator">Administrator</option>
                </select>
            </section>
            
            <section>
                <label for="regPhone">Phone Number</label>
                <input type="tel" id="regPhone" placeholder="Phone Number">
            </section>
            
            <section>
                <label for="regClinicName">Clinic Name</label>
                <input type="text" id="regClinicName" placeholder="Enter Clinic Name">
                <small>Enter the name of the clinic you work at</small>
            </section>
            
            <footer>
                <button id="submitStaffReg" class="btn-primary">Register</button>
                <button id="closeModal" class="btn-secondary">Cancel</button>
            </footer>
            <p id="regMessage"></p>
        </article>
    </dialog>

    <script type="module" src="./backend/login.js"></script>

</body>
</html>
