<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Appointment Details</title>
  <link rel="stylesheet" href="cancelpage.css" />
</head>
<body>
  <main>
    <header>
      <h1>Viewing Appointment</h1>
    </header>

    <article class="appointment">
      <header>
        <h2>Your appointment is booked as follows</h2>
        <p id="statusPill" class="status-pill"></p>
      </header>

      <section class="details">
        <dl>
          <dt>Date</dt>
          <dd id="date">-</dd>

          <dt>Time</dt>
          <dd id="time">-</dd>

          <dt>Clinic</dt>
          <dd id="clinic">-</dd>

          <dt>Reason</dt>
          <dd id="reason">-</dd>
        </dl>
      </section>

      <footer class="actions">
        <button id="cancelBtn" type="button">Cancel Appointment</button>
        <button id="rescheduleBtn" type="button">Reschedule</button>
      </footer>
    </article>
  </main>

  <script type="module" src="cancelpage.js"></script>
</body>
</html>
