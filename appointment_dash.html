<!DOCTYPE html>
<html lang="fa" dir="ltr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Appointments Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0f;
    --surface: #16161a;
    --surface2: #1e1e24;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0f0f2;
    --muted: #8a8a9a;
    --accent: #7c6af5;
    --accent2: #5dd4b4;
    --danger: #f07070;
    --warning: #f5b942;
    --success: #5dd4b4;
    --radius: 12px;
    --radius-sm: 8px;
  }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  /* ---- SIDEBAR ---- */
  .layout {
    display: flex;
    min-height: 100vh;
  }

  .sidebar {
    width: 220px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 28px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    position: fixed;
    top: 0; left: 0; bottom: 0;
    z-index: 10;
  }

  .sidebar-logo {
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -0.5px;
    margin-bottom: 28px;
    padding-left: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .sidebar-logo svg { width: 22px; height: 22px; }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    color: var(--muted);
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    font-weight: 500;
  }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: rgba(124,106,245,0.15); color: var(--accent); }
  .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }

  /* ---- MAIN ---- */
  .main {
    margin-left: 220px;
    flex: 1;
    padding: 32px 36px;
    display: flex;
    flex-direction: column;
    gap: 28px;
  }

  /* ---- TOPBAR ---- */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  .topbar-title {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .search-box {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 8px 14px;
    width: 240px;
    transition: border-color 0.15s;
  }
  .search-box:focus-within { border-color: var(--accent); }
  .search-box svg { width: 14px; height: 14px; color: var(--muted); flex-shrink: 0; }
  .search-box input {
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    width: 100%;
  }
  .search-box input::placeholder { color: var(--muted); }

  .btn-refresh {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    padding: 8px 16px;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn-refresh:hover { opacity: 0.85; }
  .btn-refresh svg { width: 14px; height: 14px; }

  /* ---- STAT CARDS ---- */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    position: relative;
    overflow: hidden;
  }
  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--card-accent, var(--accent));
  }
  .stat-label {
    font-size: 12px;
    color: var(--muted);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .stat-value {
    font-size: 30px;
    font-weight: 700;
    font-family: 'DM Mono', monospace;
    letter-spacing: -1px;
    line-height: 1;
  }
  .stat-sub {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }
  .stat-icon {
    position: absolute;
    top: 16px; right: 16px;
    width: 32px; height: 32px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    background: rgba(255,255,255,0.05);
  }
  .stat-icon svg { width: 16px; height: 16px; }

  /* ---- TOOLBAR ---- */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .filter-group {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 6px 12px;
  }
  .filter-group label { font-size: 12px; color: var(--muted); }
  .filter-group select {
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    cursor: pointer;
  }
  .filter-group select option { background: #1e1e24; color: var(--text); }

  .rows-badge {
    margin-left: auto;
    font-size: 12px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }

  /* ---- TABLE ---- */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  thead tr {
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }

  th {
    padding: 12px 16px;
    text-align: left;
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
    transition: color 0.15s;
  }
  th:hover { color: var(--text); }
  th .sort-arrow { opacity: 0.3; margin-left: 4px; }
  th.sorted .sort-arrow { opacity: 1; color: var(--accent); }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
    cursor: pointer;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }

  td {
    padding: 13px 16px;
    color: var(--text);
    vertical-align: middle;
    white-space: nowrap;
  }

  .td-mono {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }

  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
  }
  .status-badge::before {
    content: '';
    width: 5px; height: 5px;
    border-radius: 50%;
    background: currentColor;
  }
  .badge-scheduled { background: rgba(124,106,245,0.12); color: var(--accent); }
  .badge-completed { background: rgba(93,212,180,0.12); color: var(--success); }
  .badge-cancelled { background: rgba(240,112,112,0.12); color: var(--danger); }
  .badge-pending { background: rgba(245,185,66,0.12); color: var(--warning); }
  .badge-default { background: rgba(138,138,154,0.12); color: var(--muted); }

  /* ---- PAGINATION ---- */
  .pagination {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    border-top: 1px solid var(--border);
    font-size: 13px;
    color: var(--muted);
  }
  .page-btns { display: flex; gap: 6px; }
  .page-btn {
    width: 32px; height: 32px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: none;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, color 0.15s;
  }
  .page-btn:hover { background: var(--surface2); color: var(--text); }
  .page-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* ---- LOADING / EMPTY / ERROR ---- */
  .state-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    gap: 12px;
    color: var(--muted);
  }
  .state-box svg { width: 36px; height: 36px; opacity: 0.4; }
  .state-box p { font-size: 14px; }

  .spinner {
    width: 28px; height: 28px;
    border: 2px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ---- MODAL ---- */
  .modal-bg {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 28px;
    width: 480px;
    max-width: 95vw;
    max-height: 80vh;
    overflow-y: auto;
  }
  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .modal-title { font-size: 16px; font-weight: 700; }
  .modal-close {
    background: none; border: none; color: var(--muted);
    cursor: pointer; font-size: 20px; line-height: 1;
    transition: color 0.15s;
  }
  .modal-close:hover { color: var(--text); }
  .modal-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    gap: 16px;
  }
  .modal-row:last-child { border-bottom: none; }
  .modal-key { color: var(--muted); flex-shrink: 0; min-width: 130px; }
  .modal-val { color: var(--text); text-align: right; word-break: break-word; font-family: 'DM Mono', monospace; font-size: 12px; }

  /* ---- RESPONSIVE ---- */
  @media (max-width: 900px) {
    .sidebar { display: none; }
    .main { margin-left: 0; padding: 20px; }
    .stats-row { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      MedPanel
    </div>
    <div class="nav-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Appointments
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Patients
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Analytics
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
      Settings
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <!-- TOPBAR -->
    <div class="topbar">
      <div class="topbar-title">Appointments</div>
      <div class="topbar-right">
        <div class="search-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="searchInput" placeholder="Search..." oninput="applyFilters()"/>
        </div>
        <button class="btn-refresh" onclick="loadData()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          Refresh
        </button>
      </div>
    </div>

    <!-- STATS -->
    <div class="stats-row">
      <div class="stat-card" style="--card-accent: var(--accent)">
        <div class="stat-icon"><svg viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div>
        <div class="stat-label">Total</div>
        <div class="stat-value" id="statTotal">—</div>
        <div class="stat-sub">All appointments</div>
      </div>
      <div class="stat-card" style="--card-accent: var(--success)">
        <div class="stat-icon"><svg viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg></div>
        <div class="stat-label">Completed</div>
        <div class="stat-value" id="statCompleted">—</div>
        <div class="stat-sub">Successfully done</div>
      </div>
      <div class="stat-card" style="--card-accent: var(--warning)">
        <div class="stat-icon"><svg viewBox="0 0 24 24" fill="none" stroke="var(--warning)" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
        <div class="stat-label">Scheduled</div>
        <div class="stat-value" id="statScheduled">—</div>
        <div class="stat-sub">Upcoming</div>
      </div>
      <div class="stat-card" style="--card-accent: var(--danger)">
        <div class="stat-icon"><svg viewBox="0 0 24 24" fill="none" stroke="var(--danger)" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg></div>
        <div class="stat-label">Cancelled</div>
        <div class="stat-value" id="statCancelled">—</div>
        <div class="stat-sub">Not attended</div>
      </div>
    </div>

    <!-- TOOLBAR -->
    <div class="toolbar">
      <div class="filter-group">
        <label>Status</label>
        <select id="filterStatus" onchange="applyFilters()">
          <option value="">All</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Rows/page</label>
        <select id="pageSize" onchange="changePageSize()">
          <option value="20">20</option>
          <option value="50">50</option>
          <option value="100">100</option>
        </select>
      </div>
      <span class="rows-badge" id="rowsBadge"></span>
    </div>

    <!-- TABLE -->
    <div class="table-wrap">
      <table>
        <thead id="tableHead"></thead>
        <tbody id="tableBody"></tbody>
      </table>
      <div id="stateBox" class="state-box">
        <div class="spinner"></div>
        <p>Loading appointments...</p>
      </div>
      <div class="pagination" id="paginationBar" style="display:none">
        <span id="pageInfo" style="font-size:12px;color:var(--muted)"></span>
        <div class="page-btns" id="pageBtns"></div>
      </div>
    </div>
  </main>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modalBg" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Appointment Details</span>
      <button class="modal-close" onclick="document.getElementById('modalBg').classList.remove('open')">&#10005;</button>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

<script>
  /* ======================================================
     CONFIGURATION — replace these with your actual values
  ====================================================== */
  const SUPABASE_URL  = "https://ixikhufrylaugpdxokwu.supabase.co";    
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml4aWtodWZyeWxhdWdwZHhva3d1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NTQ0NTIsImV4cCI6MjA5MTIzMDQ1Mn0.F7g_bNWAsxjWtkHihVNYPicghiKOisgHGV9-zaBjXvQ";
  const TABLE_NAME    = "Appointments";              // exact table name (note the typo if it exists)
  /* ====================================================== */

  let allData       = [];
  let filteredData  = [];
  let columns       = [];
  let currentPage   = 1;
  let pageSize      = 20;
  let sortCol       = null;
  let sortDir       = 1;

  const headers = () => ({
    "apikey": SUPABASE_ANON_KEY,
    "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
    "Content-Type": "application/json"
  });

  async function loadData() {
    showState("loading");
    try {
      const res  = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE_NAME}?select=*`, { headers: headers() });
      if (!res.ok) { const e = await res.json(); throw new Error(e.message || res.statusText); }
      const data = await res.json();
      if (!Array.isArray(data) || data.length === 0) { showState("empty"); return; }

      allData  = data;
      columns  = Object.keys(data[0]);
      buildHead();
      buildStatusFilter();
      updateStats();
      applyFilters();
      showState(null);
    } catch (err) {
      showState("error", err.message);
    }
  }

  function buildHead() {
    const tr = document.getElementById("tableHead");
    tr.innerHTML = "<tr>" + columns.map(col =>
      `<tr><th onclick="sortBy('${col}')" id="th_${col}">
        ${col} <span class="sort-arrow">↕</span>
      </th>`
    ).join("") + "</tr>";
    tr.innerHTML = "<tr>" + columns.map(col =>
      `<th onclick="sortBy('${col}')" id="th_${col}">${col} <span class="sort-arrow">↕</span></th>`
    ).join("") + "</tr>";
  }

  function buildStatusFilter() {
    const statusKeys = ["status","Status","STATUS","state","State"];
    let statusCol = statusKeys.find(k => columns.includes(k));
    const sel = document.getElementById("filterStatus");
    sel.innerHTML = `<option value="">All</option>`;
    if (statusCol) {
      const vals = [...new Set(allData.map(r => r[statusCol]).filter(Boolean))].sort();
      vals.forEach(v => { const o = document.createElement("option"); o.value = v; o.textContent = v; sel.appendChild(o); });
    }
  }

  function updateStats() {
    document.getElementById("statTotal").textContent = allData.length.toLocaleString();
    const statusKeys = ["status","Status","STATUS","state","State"];
    let sc = statusKeys.find(k => columns.includes(k));
    if (sc) {
      const count = (v) => allData.filter(r => String(r[sc]).toLowerCase() === v).length;
      document.getElementById("statCompleted").textContent = count("completed").toLocaleString();
      document.getElementById("statScheduled").textContent = (count("scheduled") + count("confirmed")).toLocaleString();
      document.getElementById("statCancelled").textContent  = count("cancelled").toLocaleString();
    } else {
      ["statCompleted","statScheduled","statCancelled"].forEach(id => document.getElementById(id).textContent = "N/A");
    }
  }

  function applyFilters() {
    const q  = document.getElementById("searchInput").value.toLowerCase().trim();
    const st = document.getElementById("filterStatus").value;
    const statusKeys = ["status","Status","STATUS","state","State"];
    let sc = statusKeys.find(k => columns.includes(k));

    filteredData = allData.filter(row => {
      const matchSearch = !q || Object.values(row).some(v => String(v).toLowerCase().includes(q));
      const matchStatus = !st || (sc && row[sc] === st);
      return matchSearch && matchStatus;
    });

    if (sortCol) {
      filteredData.sort((a, b) => {
        const av = a[sortCol], bv = b[sortCol];
        return (av < bv ? -1 : av > bv ? 1 : 0) * sortDir;
      });
    }

    currentPage = 1;
    renderTable();
  }

  function sortBy(col) {
    if (sortCol === col) sortDir *= -1;
    else { sortCol = col; sortDir = 1; }
    document.querySelectorAll("th").forEach(th => th.classList.remove("sorted"));
    const th = document.getElementById(`th_${col}`);
    if (th) {
      th.classList.add("sorted");
      th.querySelector(".sort-arrow").textContent = sortDir === 1 ? "↑" : "↓";
    }
    applyFilters();
  }

  function renderTable() {
    const start  = (currentPage - 1) * pageSize;
    const page   = filteredData.slice(start, start + pageSize);
    const tbody  = document.getElementById("tableBody");

    tbody.innerHTML = page.map(row =>
      `<tr onclick='openModal(${JSON.stringify(row).replace(/'/g,"&#39;")})'>${
        columns.map(col => `<td>${formatCell(col, row[col])}</td>`).join("")
      }</tr>`
    ).join("");

    const total = filteredData.length;
    document.getElementById("rowsBadge").textContent = `${total.toLocaleString()} row${total !== 1 ? "s" : ""}`;

    const pbar = document.getElementById("paginationBar");
    pbar.style.display = "flex";
    document.getElementById("pageInfo").textContent =
      `${start + 1}–${Math.min(start + pageSize, total)} of ${total.toLocaleString()}`;
    renderPagination(total);
  }

  function formatCell(col, val) {
    if (val === null || val === undefined || val === "") return `<span style="color:var(--muted)">—</span>`;
    const colL = col.toLowerCase();
    if (colL.includes("status") || colL.includes("state")) return badgeHtml(val);
    if (colL.includes("date") || colL.includes("time") || colL.includes("at")) {
      const d = new Date(val);
      if (!isNaN(d)) return `<span class="td-mono">${d.toLocaleDateString()} <span style="opacity:0.6">${d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</span></span>`;
    }
    if (colL === "id" || colL.endsWith("_id")) return `<span class="td-mono">${String(val).substring(0,12)}${String(val).length > 12 ? "…" : ""}</span>`;
    const s = String(val);
    return s.length > 40 ? `<span title="${s.replace(/"/g,'&quot;')}">${s.substring(0,40)}…</span>` : s;
  }

  function badgeHtml(val) {
    const v = String(val).toLowerCase();
    let cls = "badge-default";
    if (v === "scheduled" || v === "confirmed") cls = "badge-scheduled";
    else if (v === "completed" || v === "done") cls = "badge-completed";
    else if (v === "cancelled" || v === "canceled") cls = "badge-cancelled";
    else if (v === "pending" || v === "waiting") cls = "badge-pending";
    return `<span class="status-badge ${cls}">${val}</span>`;
  }

  function renderPagination(total) {
    const pages = Math.ceil(total / pageSize);
    const c = currentPage;
    let nums = new Set([1, pages, c, c-1, c+1].filter(n => n >= 1 && n <= pages));
    const sorted = [...nums].sort((a,b) => a-b);
    const btns = document.getElementById("pageBtns");
    btns.innerHTML = "";
    const mkBtn = (label, page, disabled, active) => {
      const b = document.createElement("button");
      b.className = "page-btn" + (active ? " active" : "");
      b.textContent = label;
      b.disabled = disabled;
      b.onclick = () => { currentPage = page; renderTable(); };
      return b;
    };
    btns.appendChild(mkBtn("‹", c-1, c===1, false));
    let prev = 0;
    sorted.forEach(n => {
      if (n - prev > 1) { const e = document.createElement("button"); e.className="page-btn"; e.textContent="…"; e.disabled=true; btns.appendChild(e); }
      btns.appendChild(mkBtn(n, n, false, n===c));
      prev = n;
    });
    btns.appendChild(mkBtn("›", c+1, c===pages, false));
  }

  function changePageSize() {
    pageSize = parseInt(document.getElementById("pageSize").value);
    currentPage = 1;
    renderTable();
  }

  function showState(type, msg) {
    const box   = document.getElementById("stateBox");
    const thead = document.getElementById("tableHead");
    const tbody = document.getElementById("tableBody");
    const pbar  = document.getElementById("paginationBar");
    if (type === null) {
      box.style.display = "none";
      thead.style.display = ""; tbody.style.display = "";
      return;
    }
    box.style.display = "flex";
    thead.style.display = "none"; tbody.style.display = "none"; pbar.style.display = "none";
    if (type === "loading") {
      box.innerHTML = `<div class="spinner"></div><p>Loading appointments...</p>`;
    } else if (type === "empty") {
      box.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><p>No appointments found</p>`;
    } else if (type === "error") {
      box.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="var(--danger)" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><p style="color:var(--danger)">Error: ${msg}</p>`;
    }
  }

  function openModal(row) {
    const body = document.getElementById("modalBody");
    body.innerHTML = Object.entries(row).map(([k,v]) =>
      `<div class="modal-row"><span class="modal-key">${k}</span><span class="modal-val">${v === null || v === undefined || v === "" ? "<span style='color:var(--muted)'>null</span>" : String(v)}</span></div>`
    ).join("");
    document.getElementById("modalBg").classList.add("open");
  }

  function closeModal(e) {
    if (e.target === document.getElementById("modalBg"))
      document.getElementById("modalBg").classList.remove("open");
  }

  loadData();
</script>
</body>
</html>
