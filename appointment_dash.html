<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Appointments Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;700&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/@supabase/supabase-js@2.39.0/dist/umd/supabase.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d0d0f; --surface: #16161a; --surface2: #1e1e24;
  --border: rgba(255,255,255,0.08); --text: #f0f0f2; --muted: #8a8a9a;
  --accent: #7c6af5; --success: #5dd4b4; --danger: #f07070; --radius: 12px;
}
body { font-family: 'Syne', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; justify-content: center; }
.main { width: 100%; max-width: 1200px; padding: 32px 20px; display: flex; flex-direction: column; gap: 24px; }
.topbar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
.topbar-title { font-size: 24px; font-weight: 700; }
.topbar-right { display: flex; gap: 10px; align-items: center; }
.user-pill { background: var(--surface2); border: 1px solid var(--border); padding: 6px 12px; border-radius: 8px; font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.search-box { background: var(--surface); border: 1px solid var(--border); padding: 8px 12px; border-radius: 8px; }
.search-box input { background: none; border: none; color: white; outline: none; font-family: 'Syne', sans-serif; }
.btn-refresh { background: var(--accent); border: none; padding: 8px 14px; border-radius: 8px; color: white; cursor: pointer; font-family: 'Syne', sans-serif; font-size: 13px; }
.btn-logout { background: transparent; border: 1px solid var(--border); padding: 8px 14px; border-radius: 8px; color: var(--muted); cursor: pointer; font-family: 'Syne', sans-serif; font-size: 13px; transition: border-color 0.2s, color 0.2s; }
.btn-logout:hover { border-color: var(--danger); color: var(--danger); }
.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
.stat-card { background: var(--surface); border-radius: var(--radius); padding: 16px; }
.stat-label { font-size: 12px; color: var(--muted); }
.stat-value { font-size: 26px; font-weight: bold; }
.table-wrap { background: var(--surface); border-radius: var(--radius); overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
table { width: 100%; border-collapse: collapse; }
thead { background: var(--surface2); }
th, td { padding: 12px; text-align: left; }
th { font-size: 11px; color: var(--muted); cursor: pointer; user-select: none; }
th:hover { color: var(--text); }
tbody tr { transition: background 0.15s; }
tbody tr:hover { background: var(--surface2); }
.status { padding: 4px 10px; border-radius: 20px; font-size: 11px; white-space: nowrap; }
.completed { background: rgba(93,212,180,0.2); color: var(--success); }
.scheduled { background: rgba(124,106,245,0.2); color: var(--accent); }
.cancelled  { background: rgba(240,112,112,0.2); color: var(--danger); }
.empty-state { padding: 48px; text-align: center; color: var(--muted); font-size: 14px; }
.pagination { padding: 12px; text-align: center; color: var(--muted); font-size: 13px; }
.spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.2); border-top-color: white; border-radius: 50%; display: inline-block; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 6px; }
@keyframes spin { to { transform: rotate(360deg); } }
@media (max-width: 680px) { .stats-row { grid-template-columns: repeat(2, 1fr); } .user-pill { display: none; } }
</style>
</head>
<body>
<main class="main">
  <div class="topbar">
    <div class="topbar-title">My Appointments</div>
    <div class="topbar-right">
      <div class="user-pill" id="userPill">Loading…</div>
      <div class="search-box"><input id="searchInput" placeholder="Search…" oninput="applyFilters()"/></div>
      <button class="btn-refresh" onclick="loadData()">Refresh</button>
      <button class="btn-logout" onclick="handleLogout()">Sign out</button>
    </div>
  </div>
  <div class="stats-row">
    <div class="stat-card"><div class="stat-label">Total</div><div class="stat-value" id="statTotal">—</div></div>
    <div class="stat-card"><div class="stat-label">Completed</div><div class="stat-value" id="statCompleted">—</div></div>
    <div class="stat-card"><div class="stat-label">Scheduled</div><div class="stat-value" id="statScheduled">—</div></div>
    <div class="stat-card"><div class="stat-label">Cancelled</div><div class="stat-value" id="statCancelled">—</div></div>
  </div>
  <div class="table-wrap">
    <table>
      <thead id="tableHead"></thead>
      <tbody id="tableBody"><tr><td class="empty-state"><span class="spinner"></span>Checking session…</td></tr></tbody>
    </table>
    <div class="pagination" id="paginationBar"></div>
  </div>
</main>
<script>
const SUPABASE_URL      = "https://ixikhufrylaugpdxokwu.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml4aWtodWZyeWxhdWdwZHhva3d1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NTQ0NTIsImV4cCI6MjA5MTIzMDQ1Mn0.F7g_bNWAsxjWtkHihVNYPicghiKOisgHGV9-zaBjXvQ";
const TABLE_NAME        = "Appointments";
const USER_COL          = "patient_email";
const LOGIN_PAGE        = "/pages/dashboard.html"; // ← update if your login page path differs

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let allData = [], filteredData = [], columns = [], sortCol = null, sortAsc = true;
//
const columnLabels = {
  "Staff.FullName": "Doctor",
  "Facilities.Name": "Clinic",
  reason: "Reason",
  status: "Status",
  ClinicID: "Clinic ID",
  appointment_date: "Appointment Date",
  appointment_time: "Appointment Time"
};
async function boot() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = LOGIN_PAGE; return; }
  document.getElementById("userPill").textContent = session.user.email;
  await loadData(session.user.email);
}

async function handleLogout() {
  await sb.auth.signOut();
  window.location.href = LOGIN_PAGE;
}

async function loadData(email) {
  if (!email) {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.href = LOGIN_PAGE; return; }
    email = session.user.email;
  }
  document.getElementById("tableBody").innerHTML =
    '<tr><td class="empty-state"><span class="spinner"></span>Loading your appointments…</td></tr>';

  const { data, error } = await sb.from(TABLE_NAME).select(`*,Staff(FullName),Facilities(Name)`).eq(USER_COL, email);

  if (error) {
    document.getElementById("tableBody").innerHTML =
      '<tr><td class="empty-state" style="color:var(--danger)">Error: ' + error.message + '</td></tr>';
    return;
  }
  allData = data || [];
  if (!allData.length) {
    columns = [];
    document.getElementById("tableHead").innerHTML = "";
    document.getElementById("tableBody").innerHTML =
      '<tr><td class="empty-state">No appointments found for your account.</td></tr>';
    updateStats(); document.getElementById("paginationBar").textContent = ""; return;
  }
  columns = ["Staff.FullName", "Facilities.Name", "reason", "status", "ClinicID", "appointment_date", "appointment_time"];
  buildHead(); updateStats(); applyFilters();
}

function getValue(row, col) {
  if (col.includes(".")) {
    return col.split(".").reduce((obj, key) => obj?.[key], row);
  }
  return row[col];
}
function buildHead() {
  document.getElementById("tableHead").innerHTML =
    "<tr>" + columns.map(c => '<th onclick="sortBy(\'' + c + '\')">' + columnLabels[c] || c + "</th>").join("") + "</tr>";
}

function updateStats() {
  const count = v => allData.filter(x => (x.status||"").toLowerCase() === v).length;
  document.getElementById("statTotal").textContent     = allData.length;
  document.getElementById("statCompleted").textContent = count("completed");
  document.getElementById("statScheduled").textContent = count("scheduled");
  document.getElementById("statCancelled").textContent = count("cancelled");
}

function applyFilters() {
  const q = document.getElementById("searchInput").value.toLowerCase();
  filteredData = allData.filter(row => Object.values(row).some(v => String(v).toLowerCase().includes(q)));
  render();
}

function sortBy(col) {
  sortAsc = sortCol === col ? !sortAsc : true; sortCol = col;
  filteredData.sort((a,b) => {
    const va = String(a[col]||"").toLowerCase(), vb = String(b[col]||"").toLowerCase();
    return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
  });
  render();
}

function render() {
  if (!filteredData.length) {
    document.getElementById("tableBody").innerHTML =
      '<tr><td colspan="' + (columns.length||1) + '" class="empty-state">No matching records.</td></tr>';
    document.getElementById("paginationBar").textContent = "0 rows"; return;
  }
  document.getElementById("tableBody").innerHTML =
    filteredData.map(row => "<tr>" + columns.map(c => "<td>" + format(getValue(row, c)) + "</td>").join("") + "</tr>").join("");
  document.getElementById("paginationBar").textContent =
    filteredData.length + " of " + allData.length + " row" + (allData.length !== 1 ? "s" : "");
}

function format(val) {
  if (val === null || val === undefined || val === "") return "—";
  const s = String(val).toLowerCase();
  if (s === "completed") return '<span class="status completed">' + val + "</span>";
  if (s === "scheduled") return '<span class="status scheduled">' + val + "</span>";
  if (s === "cancelled")  return '<span class="status cancelled">'  + val + "</span>";
  return val;
}

boot();
</script>
</body>
</html>
