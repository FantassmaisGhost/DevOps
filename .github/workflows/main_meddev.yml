# ============================================================
# main_meddev.yml — Deploy to Azure on push to main
# (non-release continuous deployment)
#
# NOTE: Tagged releases are handled by release.yml instead.
# This workflow handles untagged pushes to main only.
# ============================================================
name: Build and deploy to Azure Web App - MedDev

on:
  push:
    branches:
      - main
    tags-ignore:
      - "v*.*.*"   # Tagged releases go through release.yml
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests (required before deploy)
        run: npm run test:ci

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: |
            backend/
            pages/
            server.js
            web.config
            iisnode.yml
            babel.config
            babel.config.js
            package.json
            package-lock.json
          retention-days: 1

  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    environment:
      name: Production
      url: https://meddev-gahjbnc4dwb2d0bg.canadacentral-01.azurewebsites.net/pages/index.html

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZUREAPPSERVICE_CLIENTID_8BCB22CCD0114E80B8652B99C8C20BC8 }}
          tenant-id:       ${{ secrets.AZUREAPPSERVICE_TENANTID_224B1CD79C4D42D4A50EE4AEE898B401 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_E3550A30C26043A186C5D00E53867AF1 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: MedDev
          package:  .